# Example — copy to `wrangler.toml` and set your Worker name + KV namespace id.

name = "your-status-page-worker"
main = "dist/main.js"
workers_dev = true
compatibility_date = "2021-07-23"
no_bundle = true

[[kv_namespaces]]
binding = "KV_STATUS_PAGE"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_UUID"

[triggers]
crons = ["*/5 * * * *"]

[site]
bucket = "out"
